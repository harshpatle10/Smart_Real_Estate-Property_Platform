server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      routes:

        - id: auth-service
          uri: ht8tp://localhost:8081
          predicates:
            - Path=/auth/**

        - id: application-service
          uri: http://localhost:8082
          predicates:
            - Path=/applications/**

        - id: review-service
          uri: http://localhost:8083
          predicates:
            - Path=/reviews/**

        - id: admin-service
          uri: http://localhost:8084
          predicates:
            - Path=/admin/**